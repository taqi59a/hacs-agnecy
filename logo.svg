  <!-- Blue swoosh below -->
  <path d="M40 108 Q80 135 140 118" fill="none" stroke="#2856a3" stroke-width="7" stroke-linecap="round"/>
  <!-- Airplane silhouette -->
  <g transform="translate(128, 98) rotate(-25) scale(0.55)">
    <path d="M0 0 L-18 -8 L-45 -5 L-18 0 L-45 12 L-18 6 L5 14 L8 6 L30 4 L8 0 L30 -6 L5 -8 Z" fill="#7a8a9a"/>
  </g>
  <!-- Voyagez Autrement tagline -->
