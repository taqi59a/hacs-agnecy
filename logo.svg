<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 160" width="380" height="160">
  <defs>
    <style>
      .hacs-text { font-family: 'Georgia', 'Times New Roman', serif; font-weight: bold; }
      .la-text { font-family: 'Georgia', 'Times New Roman', serif; font-weight: normal; }
      .tagline { font-family: 'Georgia', 'Times New Roman', serif; font-style: italic; }
    </style>
  </defs>
  <!-- Gray arc/swoosh above -->
  <path d="M160 12 Q220 -8 260 18 Q280 30 270 50" fill="none" stroke="#9aabb8" stroke-width="8" stroke-linecap="round"/>
